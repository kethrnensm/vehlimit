name: Build Linux Plugin

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo dpkg --add-architecture i386
          sudo apt update
          sudo apt install -y \
            g++-multilib \
            gcc-multilib \
            libc6-dev-i386 \
            make

      - name: Show project structure
        run: |
          pwd
          ls -R

      - name: Create output folder
        run: mkdir -p plugins

      - name: Build 32-bit plugin
        run: |
          g++ -m32 \
            -shared \
            -fPIC \
            -O2 \
            src/*.cpp \
            -o plugins/vehlimit.so

      - name: Verify binary
        run: |
          file plugins/vehlimit.so

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: vehlimit-linux
          path: plugins/vehlimit.so
